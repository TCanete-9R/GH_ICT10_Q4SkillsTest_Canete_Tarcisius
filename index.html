<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>Attendance Tracker</title>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <style>
        body {
            font-family: Arial;
            background: #40b8c0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgb(211, 211, 204);
            padding: 30px;
            border-radius: 20px;
            width: 250px;
        }

        h2 {
            color: rgb(156, 65, 67);
            text-align: center;
        }

        select, input, button {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
        }

        button {
            background: rgb(187, 108, 65);
            color: white;
            border: none;
            border-radius: 5px;
        }

        #graph {
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="card">
    <h2>Attendance Tracker</h2>

        <label>Monday</label>
        <input type="number" id="mon">

        <label>Tuesday</label>
        <input type="number" id="tue">

        <label>Wednesday</label>
        <input type="number" id="wed">

        <label>Thursday</label>
        <input type="number" id="thu">

        <label>Friday</label>
        <input type="number" id="fri">

        <button py-click="update_all">Submit</button>
    </div> 

    <div id='output'></div>

    <py-script src="main.py"></py-script>

</body>
</html>
